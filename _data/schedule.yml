# Course schedule data, rendered by _includes/course_schedule.html
#
# Structure:
#   modules: the legend shown above the schedule (text + label color class)
#   weeks:
#     - week: <number>            -> "Week N" heading (anchor #week-N)
#       module: {text, label_class}  -> label shown under the week heading
#       start / end: ISO dates    -> used by the "Jump to Current Week" button
#       recess: true              -> grays out the week (optional)
#       sessions:                 -> one table row each
#         - type: lecture | lab
#           dates: [{date: ISO date, text: shown text}]  (labs may list two)
#           topics:
#             - title: session title       (plain text)
#               title_html: ...            (use instead of title when the
#                                           heading needs inline HTML, e.g. a
#                                           link to a guest speaker)
#               subtopics: [plain strings] (optional)
#           flags: [{text, label_class}]   (assignment due labels etc., optional)
#           resources:                     (optional)
#             - title: Slides | Required | Optional
#               class: slides | required | optional
#               items:
#                 - class: slides | ref | ext_ref | video
#                   text: link text        (or `html:` when it needs markup,
#                                           e.g. <strong> around book titles)
#                   url: link target
#                   internal: true         (for same-site links; prefixes baseurl)
modules:
- label_class: label-purple
  text: 'Module 1: Computational Thinking & Programming Basics'
- label_class: label-blue
  text: 'Module 2: Urban Data Wrangling & Visualization'
